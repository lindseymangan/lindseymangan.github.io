<style class="design-page">
    body {
        font-family: Arial, sans-serif;
        padding: 20px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        text-align: center;
    }

    .gallery img {
        width: 80%;
        height: 300px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.3s ease;
    }

    .gallery img:hover {
        transform: scale(1.05);
    }

    /* Lightbox overlay */
    .lightbox {
        display: none;
        position: fixed;
        z-index: 9999;
        padding-top: 60px;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background: rgba(0,0,0,0.9);
    }

    .lightbox img {
        display: block;
        margin: auto;
        max-width: 80%;
        max-height: 80%;
        border-radius: 10px;
    }

    .lightbox:target {
        display: block;
    }

    .close {
        position: absolute;
        top: 20px;
        right: 40px;
        font-size: 40px;
        color: white;
        text-decoration: none;
    }
</style>
