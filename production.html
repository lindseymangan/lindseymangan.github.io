<style>
    body {
        font-family: Arial, sans-serif;
        background: #f4f4f4;
        padding: 20px;
    }

    .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 15px;
    }

    .gallery img {
        width: 100%;
        height: 180px;
        object-fit: cover;
        border-radius: 8px;
        cursor: pointer;
        transition: transform 0.3s ease;
    }

    .gallery img:hover {
        transform: scale(1.05);
    }

    /* Lightbox overlay */
    .lightbox {
        display: none;
        position: fixed;
        z-index: 10;
        padding-top: 60px;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background: rgba(0,0,0,0.9);
    }

    .lightbox img {
        display: block;
        margin: auto;
        max-width: 80%;
        max-height: 80%;
        border-radius: 10px;
    }

    .lightbox:target {
        display: block;
    }

    .close {
        position: absolute;
        top: 20px;
        right: 40px;
        font-size: 40px;
        color: white;
        text-decoration: none;
    }
</style>
</head>
<body class="production-page">
