<!DOCTYPE html>
<html lang="en">

	<head>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
		
		<meta name="viewport" content="width=device-width, initial-scale=1">

		<title>Other Work</title>

		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

		<link href="./styles/style.css" rel="stylesheet">
	</head>
	
	<body>
		<div class="container">
			<h1>Variety of Work</h1>
		</div>
		<div class="container">
			<h4></h4>
            <iframe width="560" height="315" src="https://www.youtube.com/embed/OBuU94cs458?si=B5r-bQ4uQBzNd7CI" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
		</div>	

		<!-- this is the button that will trigger the modal. make sure that the 'data-bs-target' matches the modal id  -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#exModal">Example modal</button>


<!-- this is the modal that will pop up when that button above is clicked -->
<div class="modal fade" id="exModal" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
    <!-- the modal-fullscreen class ensures that the modal takes up the full screen. you can remove that if you don't want the modal to do so -->
    <div class="modal-dialog modal-fullscreen">
        <div class="modal-content">
            <!-- this is the header — you can delete the h1, if you want, or get rid of the whole header. just make sure to keep a close button, whether that's in the header, the footer, or in the body -->
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="exampleModalLabel">Modal title</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">

                <!-- this is where you put the information for this modal -->

            </div>
            <!-- this is your footer — you can use it, or delete -->
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>



		<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
	</body>
</html>
